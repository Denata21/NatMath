<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NatMath</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .landing-content { text-align: center; color: white; padding: 40px; max-width: 500px; }
    .landing-logo { font-size: 4rem; margin-bottom: 10px; }
    h1 { font-size: 3rem; font-weight: bold; margin-bottom: 10px; }
    .landing-subtitle { font-size: 1.2rem; opacity: 0.9; margin-bottom: 16px; }
    .landing-desc { font-size: 0.95rem; opacity: 0.8; line-height: 1.7; margin-bottom: 28px; }
    .landing-features { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 32px; }
    .landing-feature { background: rgba(255,255,255,0.15); padding: 8px 16px; border-radius: 20px; font-size: 0.9rem; }
    .landing-btn { padding: 14px 36px; background: white; color: #4f46e5; border: none; border-radius: 50px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .landing-btn:hover { transform: scale(1.05); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
  </style>
</head>
<body>
  <div class="landing-content">
    <div class="landing-logo">📐</div>
    <h1>NatMath</h1>
    <p class="landing-subtitle">Platform Belajar Matematika Interaktif</p>
    <p class="landing-desc">Belajar matematika jadi lebih mudah dan menyenangkan dengan bantuan AI. Tersedia materi lengkap untuk semua kelas.</p>
    <div class="landing-features">
      <div class="landing-feature">🤖 Chatbot AI</div>
      <div class="landing-feature">📊 Grafik Interaktif</div>
      <div class="landing-feature">📚 Materi Lengkap</div>
      <div class="landing-feature">✏️ Contoh Soal</div>
    </div>
    <button class="landing-btn" onclick="window.location.href='login.html'">Mulai Belajar →</button>
  </div>
</body>
</html>
